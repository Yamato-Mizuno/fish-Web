<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うぉ！ - 魚類識別アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ────────────────────────── 画面1：トップ ────────────────────────── -->
    <section id="screen-top" class="screen active">
        <h1 class="title">うぉ！</h1>
        <p class="subtitle">魚の顔から生息環境を判定</p>

        <a href="#" class="start-btn fish-container" onclick="goToUpload(event)">
            <div class="fish-body">
                <span class="start-btn-text">アプリを開始</span>
            </div>
            <div class="fish-tail"></div>
        </a>
    </section>

    <!-- ────────────────────────── 画面2：アップロード ─────────────────── -->
    <section id="screen-upload" class="screen">
        <h2 class="screen-title">魚の画像をアップロード</h2>
        <p class="hint">横向きの魚の顔がよく写った画像がベストです</p>

        <div class="upload-area" id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div class="upload-content" id="upload-placeholder">
                <div class="upload-icon">🐟</div>
                <p>クリックまたはドラッグで画像を選択</p>
            </div>
            <img id="preview" alt="">
        </div>

        <button class="action-btn" id="predict-btn" disabled>判定する</button>
        <button class="back-btn" onclick="goToTop()">← 戻る</button>
    </section>

    <!-- ────────────────────────── 画面3：結果 ─────────────────────────── -->
    <section id="screen-result" class="screen">
        <h2 class="screen-title">判定結果</h2>

        <div class="result-card">
            <div class="result-image-wrapper">
                <img id="result-cropped" alt="クロップ画像">
                <p class="caption">YOLOで検出した顔領域</p>
            </div>

            <div class="result-prediction">
                <p class="label">この魚はおそらく…</p>
                <h3 class="predicted" id="predicted-label">-</h3>
                <p class="confidence">確信度: <span id="confidence">-</span></p>
            </div>
        </div>

        <div class="probability-bars" id="probability-bars">
            <!-- JSで動的生成 -->
        </div>

        <button class="action-btn" onclick="showDetails()">詳細結果を表示</button>
        <button class="back-btn" onclick="goToUpload(null)">もう一度試す</button>
    </section>

    <!-- ────────────────────────── 詳細結果モーダル ─────────────────────── -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDetails()">×</span>
            <h2 class="modal-title">研究結果の詳細</h2>

            <div class="detail-section">
                <h3>差分画像（最大差）</h3>
                <table class="data-table" id="diff-table"></table>
            </div>

            <div class="detail-section">
                <h3>コサイン類似度行列</h3>
                <table class="data-table" id="cosine-table"></table>
            </div>

            <div class="detail-section">
                <h3>ペアごとの類似度</h3>
                <ul class="pair-list" id="pair-list"></ul>
            </div>

            <div class="detail-section">
                <h3>真のカテゴリ × 最も近い重心</h3>
                <table class="data-table" id="nearest-table"></table>
            </div>

            <div class="detail-section highlight">
                <h3>回遊魚個体の最近傍重心の内訳</h3>
                <div class="breakdown" id="migratory-breakdown"></div>
                <p class="interpretation">
                    → 回遊魚は <strong>40%が海水魚の重心に最も近い</strong>。
                    淡水魚に近いのは17%だけ。
                    形態的には海水魚寄りの傾向。
                </p>
            </div>

            <div class="detail-section">
                <h3>モデル情報</h3>
                <ul class="info-list" id="model-info"></ul>
            </div>
        </div>
    </div>

    <!-- 背景の泳ぐ魚たち（装飾） -->
    <div class="swimming-fish fish-container fish1"><div class="fish-body"></div><div class="fish-tail"></div></div>
    <div class="swimming-fish fish-container fish2"><div class="fish-body"></div><div class="fish-tail"></div></div>
    <div class="swimming-fish fish-container fish3"><div class="fish-body"></div><div class="fish-tail"></div></div>
    <div class="swimming-fish fish-container fish4"><div class="fish-body"></div><div class="fish-tail"></div></div>
    <div class="swimming-fish fish-container fish5"><div class="fish-body"></div><div class="fish-tail"></div></div>

    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
