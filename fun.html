<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うぉ！ - 魚類識別アプリ（分析画面）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100vw;
            min-height: 100vh;
            background: linear-gradient(135deg, #e4efff 0%, #a1c7ff 100%);
            font-family: 'sans-serif';
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-family: 'Dela Gothic One', sans-serif;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .file-input-label {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .file-input-label:hover { background: #1d4ed8; }
        input[type="file"] { display: none; }
        
        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        #result-area {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px dashed #e2e8f0;
            display: none;
        }
        .habitat-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin-top: 10px;
        }
        /* 生息地ごとの色分け */
        .freshwater { background-color: #059669; } /* 緑 */
        .marine { background-color: #0284c7; }      /* 青 */
        .diadromous { background-color: #7c3aed; }  /* 紫 */
        .unknown { background-color: #6b7280; }     /* グレー */

        .detail-btn {
            display: inline-block;
            margin-top: 25px;
            background: #f59e0b;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .detail-btn:hover { background: #d97706; }
        
        /* ローディング表示用 */
        #loading-text {
            display: none;
            color: #2563eb;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>魚類識別カメラ</h1>

    <div class="card">
        <p style="margin-bottom: 15px; color: #4b5563;">分析する魚の画像を選択してください</p>
        
        <label class="file-input-label">
            画像を選択
            <input type="file" id="image-selector" accept="image/*">
        </label>

        <div id="loading-text">🔍 魚類データベースを解析中...</div>

        <div>
            <img id="preview" alt="プレビュー">
        </div>

        <div id="result-area">
            <h3>分析結果</h3>
            <div id="habitat-result" class="habitat-badge"></div>
            
            <br>
            <a href="#" id="to-detail-btn" class="detail-btn">詳細を表示</a>
        </div>
    </div>

    <script>
        const imageSelector = document.getElementById('image-selector');
        const preview = document.getElementById('preview');
        const resultArea = document.getElementById('result-area');
        const habitatResult = document.getElementById('habitat-result');
        const toDetailBtn = document.getElementById('to-detail-btn');
        const loadingText = document.getElementById('loading-text');

        // アプリ起動時にあらかじめ一度だけCSVを読み込んでおく（画像選択時の待ち時間を無くすため）
        let cachedCsvData = null;

        async function loadAndParseCSV() {
            if (cachedCsvData) return cachedCsvData; // すでに読み込み済みならそれを返す

            try {
                // Gitで公開されたURL（相対パス）からCSVを全行取得
                const response = await fetch('pilot_features.csv');
                if (!response.ok) throw new Error('CSVの取得に失敗しました');
                
                const csvText = await response.text();
                
                // カンマ区切りのテキストを解析して使いやすい形式に変換
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                const filenameIdx = headers.indexOf('filename');
                const habitatIdx = headers.indexOf('habitat');
                const familyIdx = headers.indexOf('Family');
                const speciesIdx = headers.indexOf('species');

                const parsedData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    // カンマでの単純分割（もしデータ内にカンマが含まれない前提）
                    const cols = lines[i].split(',');
                    parsedData.push({
                        filename: cols[filenameIdx]?.trim(),
                        habitat: cols[habitatIdx]?.trim(),
                        family: cols[familyIdx]?.trim(),
                        species: cols[speciesIdx]?.trim()
                    });
                }
                
                cachedCsvData = parsedData;
                return parsedData;
            } catch (error) {
                console.error("CSVデータの読み込みエラー:", error);
                return null;
            }
        }

        // ページを開いた瞬間から裏側でCSVのロードを開始しておく
        loadAndParseCSV();

        imageSelector.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 画像プレビューの表示
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
                preview.style.display = 'inline-block';
            }
            reader.readAsDataURL(file);

            // 画面表示をリセットし、ローディングを表示
            resultArea.style.display = 'none';
            loadingText.style.display = 'block';

            // 2. CSVデータの準備（ロードが終わっていなければここで待つ）
            const csvData = await loadAndParseCSV();
            loadingText.style.display = 'none';

            if (!csvData || csvData.length === 0) {
                alert("データベース（CSV）の読み込みに失敗したか、データが空です。");
                return;
            }

            // 3. アップロードされたファイル名とCSVの全データを照合
            const fileName = file.name;
            let match = csvData.find(item => item.filename === fileName);

            // 【デモ用】もし一致するファイル名がCSVにない場合はランダムで決定
            if (!match) {
                match = csvData[Math.floor(Math.random() * csvData.length)];
            }

            // 4. 生息地判定
            let habitatText = "不明";
            let habitatClass = "unknown";

            // 特徴量（habitat）の文字列から判定
            if (match.habitat && match.habitat.includes("freshwater")) {
                habitatText = "淡水魚";
                habitatClass = "freshwater";
            } else if (match.habitat && (match.habitat.includes("marine") || match.habitat.includes("misc"))) {
                habitatText = "海水魚";
                habitatClass = "marine";
            } else if (match.habitat && match.habitat.includes("diadromous")) {
                habitatText = "回遊魚";
                habitatClass = "diadromous";
            }

            habitatResult.textContent = habitatText;
            habitatResult.className = `habitat-badge ${habitatClass}`;

            // 5. 詳細画面(detail.html)への引き継ぎパラメータを設定
            const params = new URLSearchParams({
                filename: match.filename || '',
                species: match.species || '',
                habitat: habitatText,
                family: match.family || ''
            });
            toDetailBtn.href = `detail.html?${params.toString()}`;

            // 分析結果の表示
            resultArea.style.display = 'block';
        });
    </script>
</body>
</html>
