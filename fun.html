<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うぉ！ - 魚類識別アプリ（分析画面）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100vw;
            min-height: 100vh;
            background: linear-gradient(135deg, #e4efff 0%, #a1c7ff 100%);
            font-family: 'sans-serif';
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-family: 'Dela Gothic One', sans-serif;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .file-input-label {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .file-input-label:hover { background: #1d4ed8; }
        input[type="file"] { display: none; }
        
        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        #result-area {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px dashed #e2e8f0;
            display: none;
        }
        .habitat-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin-top: 10px;
        }
        /* 生息地ごとの色分け */
        .freshwater { background-color: #059669; } /* 緑 */
        .marine { background-color: #0284c7; }      /* 青 */
        .diadromous { background-color: #7c3aed; }  /* 紫 */
        .unknown { background-color: #6b7280; }     /* グレー（魚以外用） */

        .detail-btn {
            display: inline-block;
            margin-top: 25px;
            background: #f59e0b;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.2s, opacity 0.2s;
        }
        .detail-btn:hover { background: #d97706; }
        
        /* ボタンが無効化されたときのスタイル */
        .detail-btn.disabled {
            background: #cbd5e1 !important;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none; /* クリック不可にする */
        }
    </style>
</head>
<body>

    <h1>魚類識別カメラ</h1>

    <div class="card">
        <p style="margin-bottom: 15px; color: #4b5563;">分析する魚の画像を選択してください</p>
        
        <label class="file-input-label">
            画像を選択
            <input type="file" id="image-selector" accept="image/*">
        </label>

        <div>
            <img id="preview" alt="プレビュー">
        </div>

        <div id="result-area">
            <h3>分析結果</h3>
            <div id="habitat-result" class="habitat-badge"></div>
            
            <br>
            <a href="#" id="to-detail-btn" class="detail-btn">詳細を表示</a>
        </div>
    </div>

    <script>
        // CSVデータの定義
        const csvData = [
            { filename: "Etcae_u2.jpg", species: "Etheostoma caeruleum", habitat: "freshwater", family: "Percidae", face_value: 0.995 },
            { filename: "Ambassis_miops.jpg", species: "Ambassis miops", habitat: "marine/misc", family: "Ambassidae", face_value: 0.999 },
            { filename: "salmon.jpg", species: "Oncorhynchus keta", habitat: "diadromous", family: "Salmonidae", face_value: 0.996 } 
        ];

        const imageSelector = document.getElementById('image-selector');
        const preview = document.getElementById('preview');
        const resultArea = document.getElementById('result-area');
        const habitatResult = document.getElementById('habitat-result');
        const toDetailBtn = document.getElementById('to-detail-btn');

        imageSelector.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 画像プレビューの表示
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
                preview.style.display = 'inline-block';
            }
            reader.readAsDataURL(file);

            // 2. CSV（配列）からファイル名が一致するものを検索
            const fileName = file.name;
            let match = csvData.find(item => item.filename === fileName);

            let habitatText = "不明";
            let habitatClass = "unknown";

            // 3. 判定ロジックの変更（CSVにデータがある場合のみ魚として処理）
            if (match) {
                // ボタンの無効化を解除
                toDetailBtn.classList.remove('disabled');

                if (match.habitat.includes("freshwater")) {
                    habitatText = "淡水魚";
                    habitatClass = "freshwater";
                } else if (match.habitat.includes("marine") || match.habitat.includes("misc")) {
                    habitatText = "海水魚";
                    habitatClass = "marine";
                } else if (match.habitat.includes("diadromous")) {
                    habitatText = "回遊魚";
                    habitatClass = "diadromous";
                }

                // 詳細画面(detail.html)へのURLを設定
                const params = new URLSearchParams({
                    filename: match.filename,
                    habitat: habitatText,
                    face_value: match.face_value
                });
                toDetailBtn.href = `detail.html?${params.toString()}`;

            } else {
                // 【追加点】CSVにファイル名が存在しない＝人間など魚以外の画像と判定
                habitatText = "魚以外（判定不能）❌";
                habitatClass = "unknown";
                
                // 「詳細を表示」ボタンをグレーアウトしてクリックできないようにする
                toDetailBtn.classList.add('disabled');
                toDetailBtn.href = "#";
            }

            // 画面への反映
            habitatResult.textContent = habitatText;
            habitatResult.className = `habitat-badge ${habitatClass}`;

            // 結果エリアを表示
            resultArea.style.display = 'block';
        });
    </script>
</body>
</html>
